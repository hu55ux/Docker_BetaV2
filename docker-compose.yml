version: '3.8'

services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: docker_front
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

  backend:
    build:
      context: ./DockerBeta
      dockerfile: Dockerfile
    container_name: docker_back
    ports:
      - "5267:5267"
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=DockerBetaDB;User Id=sa;Password=YourStrongPassword123!;Encrypt=False;TrustServerCertificate=True;
    depends_on:
      - mssql

  adminer:
    image: adminer:latest
    container_name: docker_adminer
    restart: always
    ports:
      - "8080:8080"

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: docker_sql
    restart: always
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrongPassword123!
      - MSSQL_PID=Developer
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data:
